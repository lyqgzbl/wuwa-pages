name: Deploy navigation page

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare static output
        run: |
          mkdir -p public
          cp index.html public/
          if [ -f CNAME ]; then
            cp CNAME public/
          fi

      - name: Deploy to Pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          publish_branch: gh-pages
          keep_files: true
          commit_message: "deploy: sync navigation page from main"
