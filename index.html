<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>鸣潮辅助工具合集</title>
    <style>
        :root {
            /* Light mode variables matching Apple Design */
            --bg: #f5f5f7;
            --text: #1d1d1f;
            --text-muted: #86868b;
            --card-bg: #ffffff;
            --card-hover: #ffffff;
            --border: rgba(0, 0, 0, 0.08);
            --accent: #0066cc;
            --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.08), 0 2px 4px rgba(0, 0, 0, 0.04);
            color-scheme: light;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                /* macOS Dark mode strict grayscale hierarchy */
                --bg: #000000;
                --text: #f5f5f7;
                --text-muted: #86868b;
                --card-bg: #1c1c1e;
                --card-hover: #2c2c2e;
                --border: rgba(255, 255, 255, 0.1);
                --accent: #2997ff;
                --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.4);
                --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.5), 0 2px 4px rgba(0, 0, 0, 0.3);
                color-scheme: dark;
            }
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 60px 20px;
            line-height: 1.6;
            min-height: 100vh;
            box-sizing: border-box;
            transition: background-color 0.4s cubic-bezier(0.25, 1, 0.5, 1), color 0.4s cubic-bezier(0.25, 1, 0.5, 1);
            -webkit-font-smoothing: antialiased;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
        }

        h1 {
            font-size: 2.25rem;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 40px;
            text-align: center;
            letter-spacing: -0.5px;
        }

        .tool-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .tool-card {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background-color: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 24px;
            text-decoration: none;
            color: var(--text);
            box-shadow: var(--shadow-sm);
            transition: all 0.4s cubic-bezier(0.25, 1, 0.5, 1);
            position: relative;
            overflow: hidden;
        }

        .tool-card:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
            background-color: var(--card-hover);
            border-color: var(--border);
        }

        .tool-card:active {
            transform: scale(0.96);
            transition: transform 0.1s cubic-bezier(0.25, 1, 0.5, 1);
        }

        .card-content {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .tool-title {
            font-size: 1.25rem;
            font-weight: 600;
            color: var(--text);
            letter-spacing: -0.2px;
        }

        .tool-desc {
            font-size: 0.9375rem;
            color: var(--text-muted);
            margin: 0;
        }

        .card-arrow {
            color: var(--text-muted);
            opacity: 0.5;
            transition: all 0.4s cubic-bezier(0.25, 1, 0.5, 1);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .tool-card:hover .card-arrow {
            opacity: 1;
            color: var(--accent);
            transform: translateX(4px);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>鸣潮辅助工具合集</h1>
        <div class="tool-list">
            <a href="/achievement/" class="tool-card">
                <div class="card-content">
                    <span class="tool-title">成就统计工具</span>
                    <p class="tool-desc">离线成就勾选页面</p>
                </div>
                <div class="card-arrow">
                    <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="9 18 15 12 9 6"></polyline>
                    </svg>
                </div>
            </a>
            <a href="/quest/" class="tool-card">
                <div class="card-content">
                    <span class="tool-title">任务统计工具</span>
                    <p class="tool-desc">离线任务勾选页面</p>
                </div>
                <div class="card-arrow">
                    <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="9 18 15 12 9 6"></polyline>
                    </svg>
                </div>
            </a>
        </div>
    </div>
</body>
</html>
